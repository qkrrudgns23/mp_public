c.onmousemove=function(e){var x=gc(e);mx=(x.x/window.innerWidth)*2-1;my=-((x.y/window.innerHeight)*2-1);dmx=(mx-mxPrev)*.3;dmy=(my-myPrev)*.3;mxPrev=mx;myPrev=my;if(dr){ry+=(x.x-px)*sp;rx+=(x.y-py)*sp;rx=Math.max(-1.5,Math.min(1.5,rx));px=x.x;py=x.y}};
c.ontouchmove=function(e){if(!dr||e.touches.length!==1)return;e.preventDefault();var x=gc(e);mx=(x.x/window.innerWidth)*2-1;my=-((x.y/window.innerHeight)*2-1);dmx=(mx-mxPrev)*.3;dmy=(my-myPrev)*.3;mxPrev=mx;myPrev=my;ry+=(x.x-px)*sp;rx+=(x.y-py)*sp;rx=Math.max(-1.5,Math.min(1.5,rx));px=x.x;py=x.y};
c.onwheel=function(e){e.preventDefault();cam.position.z=Math.max(2.5,Math.min(6,cam.position.z+e.deltaY*.002))};
function anim(){
  requestAnimationFrame(anim);
  var t=Date.now()*.0001;
  bgGroup.rotation.y=t*.2;bgGroup.rotation.x=Math.sin(t*.095)*.07;
  starMat.opacity=.85+.1*Math.sin(t*1.3);
  if(!dr)ry+=as*.016;
  g.rotation.y=ry;g.rotation.x=rx;
  mouse.set(Math.max(-1,Math.min(1,mx+dmx*.5)),Math.max(-1,Math.min(1,my+dmy*.5)));
  raycaster.setFromCamera(mouse,cam);
  var isect=raycaster.intersectObject(g.children[0]);
  if(isect.length){g.updateMatrixWorld(!0);target.copy(isect[0].point);invG.copy(g.matrixWorld).invert();target.applyMatrix4(invG);ax+=(target.x-ax)*.1;ay+=(target.y-ay)*.1;az+=(target.z-az)*.1}
  else{ax*=.95;ay*=.95;az*=.95}
  var pull=.018,l=Math.sqrt(ax*ax+ay*ay+az*az)||1;
  for(var i=0;i<nV;i++){
    var i3=i*3,x=origPos[i3],y=origPos[i3+1],z=origPos[i3+2];
    var dx=ax/l-x,dy=ay/l-y,dz=az/l-z;
    var d=Math.sqrt(dx*dx+dy*dy+dz*dz)||1;
    var dot=(x*ax+y*ay+z*az)/(Math.sqrt(x*x+y*y+z*z)*l);
    var amt=dot>0?pull*(.3+dot*.7):0;
    posAttr.array[i3]=x+dx/d*amt;posAttr.array[i3+1]=y+dy/d*amt;posAttr.array[i3+2]=z+dz/d*amt;
  }
  posAttr.needsUpdate=!0;
  var rr=R*1.02,now=Date.now()*.00003;
  for(var pi=0;pi<450;pi++){
    var rt=routes[planeRouteIdx[pi]],t=((now+planePhases[pi])%1),v1=llv(rt[0],rt[1]),v2=llv(rt[2],rt[3]),p=slerp(v1,v2,t);
    planeSprites[pi].position.set(p[0]*rr,p[1]*rr,p[2]*rr);
  }
  var moonT=Date.now()*.00006;
  moonGroup.position.set(moonOrbitR*Math.cos(moonT),0,moonOrbitR*Math.sin(moonT));
  var satT=Date.now()*.00018;
  for(var si=0;si<10;si++){
    var sph=satPhases[si][0],sth=satPhases[si][1]+satT;
    var sx=satOrbitR*Math.sin(sph)*Math.cos(sth),sy=satOrbitR*Math.cos(sph),sz=satOrbitR*Math.sin(sph)*Math.sin(sth);
    satSprites[si].position.set(sx,sy,sz);
  }
  for(var di=0;di<debrisPlanes.length;di++){
    var dp=debrisPlanes[di];
    dp.ph+=dp.dph;dp.th+=dp.dth;
    var d=dp.dist,ph=dp.ph,th=dp.th;
    dp.mesh.position.set(d*Math.sin(ph)*Math.cos(th),d*Math.cos(ph),d*Math.sin(ph)*Math.sin(th));
    dp.mesh.rotation.x+=dp.rotX;dp.mesh.rotation.y+=dp.rotY;dp.mesh.rotation.z+=dp.rotZ;
  }
  r.render(s,cam);
}
anim();
window.onresize=function(){cam.aspect=window.innerWidth/window.innerHeight;cam.updateProjectionMatrix();r.setSize(window.innerWidth,window.innerHeight)};
})();
